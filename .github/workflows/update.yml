name: Update Dashboard from Feishu

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message (optional)'
        required: false
        default: 'chore: sync data from Feishu'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync data from Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: python3 scripts/update_dashboard.py

      - name: Commit & push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet && echo 'No changes' || (
            git commit -m "${{ github.event.inputs.message }}"
            git push
          )
