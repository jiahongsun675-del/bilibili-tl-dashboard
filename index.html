<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>B站投流效果监控与决策看板</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f4f8;color:#1e2d3d;font-size:13px}
:root{--blue:#00A1D6;--pink:#FF77AA;--gold:#FFB347;--green:#27AE60;--purple:#7B68EE}
.wrap{max-width:1400px;margin:0 auto;padding:18px 16px}
/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.hdr h1{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:.5px}
.hdr .sub{font-size:12px;color:#8a9bb0;margin-top:2px}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s}
.upload-btn:hover{background:#008cb8}
/* filters */
.filter-bar{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-label{font-size:11px;font-weight:600;color:#8a9bb0;text-transform:uppercase;letter-spacing:.5px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:3px 12px;border-radius:999px;font-size:12px;border:1.5px solid #d9e2ec;background:#fff;cursor:pointer;transition:all .15s;color:#374151}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip.cat.on{background:var(--pink);border-color:var(--pink)}
.chip.qt.on{background:var(--purple);border-color:var(--purple);color:#fff}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--blue)}
.kpi.pink{border-left-color:var(--pink)}
.kpi.gold{border-left-color:var(--gold)}
.kpi.green{border-left-color:var(--green)}
.kpi.purple{border-left-color:var(--purple)}
.kpi .lbl{font-size:11px;color:#8a9bb0;margin-bottom:4px}
.kpi .val{font-size:22px;font-weight:700;color:#1e2d3d;line-height:1.1}
.kpi .sub{font-size:11px;color:#b0bec5;margin-top:3px}
/* section */
.section{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
.section h2{font-size:14px;font-weight:600;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section h2 .bar{width:4px;height:16px;border-radius:2px;background:var(--blue);display:inline-block}
.section h2 .bar.pink{background:var(--pink)}
.section h2 .bar.gold{background:var(--gold)}
.section h2 .bar.green{background:var(--green)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}
.chart-wrap{position:relative;width:100%}
/* table */
.tbl-wrap{overflow-x:auto;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;font-weight:600;color:#6b7280;padding:8px 10px;text-align:left;border-bottom:1px solid #e5e7eb}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:#374151}
tr:hover td{background:#f8fafc}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}
.tag.头部{background:#fff3e0;color:#e65100}
.tag.腰部{background:#e3f2fd;color:#1565c0}
.tag.尾部{background:#f3e5f5;color:#6a1b9a}
/* insights */
.insight-list{display:flex;flex-direction:column;gap:10px}
.insight{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#f8fafc;border-radius:10px}
.insight .ico{font-size:20px;flex-shrink:0;line-height:1}
.insight .txt strong{font-weight:600;color:#1e2d3d}
.insight .txt p{margin-top:3px;color:#4b6070;line-height:1.6}
.highlight{color:var(--blue);font-weight:700}
.highlight.pink{color:var(--pink)}
.highlight.gold{color:var(--gold)}
.highlight.green{color:var(--green)}
/* pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap}
.pg-btn{padding:4px 12px;border-radius:6px;border:1.5px solid #d9e2ec;background:#fff;cursor:pointer;font-size:12px;color:#374151;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.pg-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-size:12px;color:#8a9bb0}
/* footer */
.section.full{margin-bottom:16px}
.footer{text-align:center;font-size:11px;color:#b0bec5;padding:10px 0 4px}
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="hdr">
    <div>
      <h1>📊 B站投流效果监控与决策看板</h1>
      <div class="sub"></div>
    </div>
    <label>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none"/>
      <span class="upload-btn">⬆ 上传新数据</span>
    </label>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-group">
      <div class="filter-label">车型</div>
      <div class="chips" id="modChips"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">UP主分类</div>
      <div class="chips" id="catChips"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">投放类型</div>
      <div class="chips" id="typeChips"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">消耗季度</div>
      <div class="chips" id="qtChips"></div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Trend -->
  <div class="section">
    <h2><span class="bar"></span>趋势分析：播放量 & 消耗金额（按视频上线日期）</h2>
    <div class="chart-wrap" style="height:220px"><canvas id="trendChart"></canvas></div>
  </div>

  <!-- Bubble + Cat -->
  <div class="two-col">
    <div class="section" style="margin-bottom:0">
      <h2><span class="bar pink"></span>效率象限（消耗 vs 播放量，气泡=互动率）<span style="font-size:11px;background:rgba(255,179,71,.15);color:#e6910a;border-radius:6px;padding:2px 8px;margin-left:6px">★ 黄金视频</span></h2>
      <div class="chart-wrap" style="height:260px"><canvas id="bubbleChart"></canvas></div>
    </div>
    <div class="section" style="margin-bottom:0">
      <h2><span class="bar"></span>UP主分类对比（CPM & 互动率）</h2>
      <div class="chart-wrap" style="height:260px"><canvas id="catChart"></canvas></div>
    </div>
  </div>
  <div style="margin-bottom:16px"></div>

  <!-- Model -->
  <div class="section">
    <h2><span class="bar gold"></span>车型表现对比（CPM & CPE）</h2>
    <div class="chart-wrap" style="height:240px"><canvas id="modelChart"></canvas></div>
  </div>

  <!-- Target type -->
  <div class="section">
    <h2><span class="bar pink"></span>投放类型对比（通投 vs 定向）</h2>
    <div class="chart-wrap" style="height:200px"><canvas id="typeChart"></canvas></div>
  </div>

  <!-- Videos table -->
  <div class="section full">
    <h2><span class="bar gold"></span>视频加热效果排行</h2>
    <div class="tbl-wrap"><table id="topTable"></table></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Insights -->
  <div class="section">
    <h2><span class="bar green"></span>策略观察 · 自动洞察</h2>
    <div class="insight-list" id="insightList"></div>
  </div>

  <div class="footer">CPM = 总消耗/总播放×1000 &nbsp;|&nbsp; 互动率 = 总互动/总播放 &nbsp;|&nbsp; CPE = 总消耗/总互动 &nbsp;|&nbsp; 数据仅在本地浏览器处理</div>
</div>

// ─── State ───────────────────────────────────────────────────────────────────
let allRows = EMBEDDED;
let selMod = [], selCat = [], selType = [], selQt = [];
const charts = {};
let tableRows = []; let currentPage = 1; const PAGE_SIZE = 20;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmt = (n,d=2) => isFinite(n) ? n.toLocaleString('zh-CN',{maximumFractionDigits:d}) : '-';
const pct = n => isFinite(n) ? (n*100).toFixed(2)+'%' : '-';
const wan = n => n>=10000 ? (n/10000).toFixed(1)+'万' : fmt(n,0);

function kpi(rows){
  const tc = rows.reduce((s,r)=>s+r.cost,0);
  const tv = rows.reduce((s,r)=>s+r.views,0);
  const ti = rows.reduce((s,r)=>s+r.interactions,0);
  return {
    totalCost:tc, totalViews:tv, totalInteractions:ti,
    cpm: tv>0?tc/tv*1000:0,
    ir:  tv>0?ti/tv:0,
    cpe: ti>0?tc/ti:0
  };
}

function groupBy(arr,fn){
  const m={};
  arr.forEach(r=>{ const k=fn(r); (m[k]=m[k]||[]).push(r); });
  return m;
}

function uniq(arr){ return [...new Set(arr)].filter(Boolean).sort(); }

// ─── Filter bar ──────────────────────────────────────────────────────────────
function buildChips(id, vals, sel, cls, onClick){
  const el = document.getElementById(id);
  el.innerHTML = '';
  vals.forEach(v=>{
    const btn = document.createElement('button');
    btn.className = 'chip '+(cls||'')+(sel.includes(v)?' on':'');
    btn.textContent = v;
    btn.onclick = ()=> onClick(v);
    el.appendChild(btn);
  });
}

function rebuildFilters(){
  buildChips('modChips',  uniq(allRows.map(r=>r.model)),       selMod,  '',   v=>toggle(selMod,v));
  buildChips('catChips',  uniq(allRows.map(r=>r.upCat)),       selCat,  'cat',v=>toggle(selCat,v));
  buildChips('typeChips', uniq(allRows.map(r=>r.targetType)),  selType, '',   v=>toggle(selType,v));
  buildChips('qtChips',   uniq(allRows.map(r=>r.quarter)),     selQt,   'qt', v=>toggle(selQt,v));
}

function toggle(arr, v){
  const i=arr.indexOf(v);
  i>=0 ? arr.splice(i,1) : arr.push(v);
  render();
}

// ─── Filtered rows ───────────────────────────────────────────────────────────
function filtered(){
  return allRows.filter(r=>
    (selMod.length===0  || selMod.includes(r.model)) &&
    (selCat.length===0  || selCat.includes(r.upCat)) &&
    (selType.length===0 || selType.includes(r.targetType)) &&
    (selQt.length===0   || selQt.includes(r.quarter))
  );
}

// ─── KPI cards ───────────────────────────────────────────────────────────────
function renderKPIs(rows){
  const k = kpi(rows);
  const cards = [
    {l:'累计消耗金额', v:'¥'+fmt(k.totalCost,0), s:'总预算支出', cls:''},
    {l:'总播放量',     v:wan(k.totalViews),        s:'覆盖人次',  cls:''},
    {l:'总互动量',     v:wan(k.totalInteractions), s:'点赞+评论+收藏', cls:'pink'},
    {l:'平均 CPM',    v:'¥'+fmt(k.cpm,2),          s:'每千次播放成本', cls:'pink'},
    {l:'互动率',       v:pct(k.ir),                s:'互动量/播放量',  cls:'gold'},
    {l:'CPE（单次互动成本）',v:k.totalInteractions>0?'¥'+fmt(k.cpe,2):'-', s:'每次互动成本', cls:'green'},
    {l:'稿件数',       v:rows.length+'条',          s:'有效投放记录',  cls:'purple'},
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c=>
    `<div class="kpi ${c.cls}"><div class="lbl">${c.l}</div><div class="val">${c.v}</div><div class="sub">${c.s}</div></div>`
  ).join('');
}

// ─── Chart helpers ───────────────────────────────────────────────────────────
function destroyChart(id){
  if(charts[id]){ charts[id].destroy(); delete charts[id]; }
}

// ─── Trend chart ─────────────────────────────────────────────────────────────
function renderTrend(rows){
  destroyChart('trendChart');
  const g = groupBy(rows.filter(r=>r.date), r=>r.date);
  const labels = Object.keys(g).sort();
  const views  = labels.map(d=>g[d].reduce((s,r)=>s+r.views,0));
  const cost   = labels.map(d=>g[d].reduce((s,r)=>s+r.cost,0));
  const ctx = document.getElementById('trendChart').getContext('2d');
  charts['trendChart'] = new Chart(ctx,{
    data:{
      labels,
      datasets:[
        {type:'line',label:'播放量',data:views,yAxisID:'y',borderColor:'#00A1D6',backgroundColor:'rgba(0,161,214,.1)',fill:true,tension:.35,pointRadius:2,borderWidth:2},
        {type:'bar', label:'消耗金额(¥)',data:cost,yAxisID:'y2',backgroundColor:'rgba(255,119,170,.6)',borderColor:'#FF77AA',borderWidth:1},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{size:11}}},tooltip:{callbacks:{
        label: ctx => ctx.dataset.label+'：'+(ctx.dataset.yAxisID==='y2'?'¥':'')+fmt(ctx.raw,0)
      }}},
      scales:{
        x:{ticks:{maxTicksLimit:12,font:{size:10}},grid:{display:false}},
        y:{position:'left',ticks:{callback:v=>wan(v),font:{size:10}},grid:{color:'#f0f4f8'}},
        y2:{position:'right',ticks:{callback:v=>'¥'+wan(v),font:{size:10}},grid:{display:false}},
      }
    }
  });
}

// ─── Bubble chart ────────────────────────────────────────────────────────────
function renderBubble(rows){
  destroyChart('bubbleChart');
  const avgCost  = rows.length?rows.reduce((s,r)=>s+r.cost,0)/rows.length:0;
  const avgViews = rows.length?rows.reduce((s,r)=>s+r.views,0)/rows.length:0;
  const maxZ = Math.max(...rows.map(r=>r.views>0?r.interactions/r.views:0),0.001);

  const golden=[], normal=[];
  rows.forEach(r=>{
    const ir=r.views>0?r.interactions/r.views:0;
    const pt={x:r.cost,y:r.views,r:Math.max(4,ir/maxZ*18),label:r.upName||r.model};
    (r.cost>avgCost&&r.views>avgViews)?golden.push(pt):normal.push(pt);
  });

  const ctx=document.getElementById('bubbleChart').getContext('2d');
  charts['bubbleChart']=new Chart(ctx,{
    type:'bubble',
    data:{datasets:[
      {label:'黄金视频 ★',data:golden,backgroundColor:'rgba(255,179,71,.7)',borderColor:'#FFB347',borderWidth:1.5},
      {label:'普通视频', data:normal,backgroundColor:'rgba(255,119,170,.5)',borderColor:'#FF77AA',borderWidth:1},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>{
          const d=ctx.raw;
          return [`UP: ${d.label||''}`,`消耗: ¥${fmt(d.x,0)}`,`播放: ${wan(d.y)}`];
        }}}
      },
      scales:{
        x:{title:{display:true,text:'消耗金额 (¥)',font:{size:11}},ticks:{callback:v=>'¥'+wan(v),font:{size:10}}},
        y:{title:{display:true,text:'播放量',font:{size:11}},ticks:{callback:v=>wan(v),font:{size:10}}},
      }
    }
  });
}

// ─── Category bar chart ──────────────────────────────────────────────────────
function renderCat(rows){
  destroyChart('catChart');
  const g=groupBy(rows,r=>r.upCat);
  const cats=Object.keys(g).sort();
  const cpms=cats.map(c=>kpi(g[c]).cpm);
  const irs=cats.map(c=>kpi(g[c]).ir*100);
  const ctx=document.getElementById('catChart').getContext('2d');
  charts['catChart']=new Chart(ctx,{
    data:{labels:cats,datasets:[
      {type:'bar', label:'CPM (¥)',data:cpms,backgroundColor:'rgba(0,161,214,.75)',yAxisID:'y',borderRadius:4},
      {type:'line',label:'互动率 (%)',data:irs,borderColor:'#FF77AA',backgroundColor:'transparent',yAxisID:'y2',tension:.3,pointRadius:5,borderWidth:2},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11}}},tooltip:{callbacks:{
        label:ctx=>ctx.dataset.label+'：'+(ctx.dataset.yAxisID==='y2'?fmt(ctx.raw,2)+'%':'¥'+fmt(ctx.raw,2))
      }}},
      scales:{
        x:{ticks:{font:{size:12}}},
        y:{position:'left',ticks:{callback:v=>'¥'+fmt(v,0),font:{size:10}},title:{display:true,text:'CPM',font:{size:10}}},
        y2:{position:'right',ticks:{callback:v=>v.toFixed(2)+'%',font:{size:10}},title:{display:true,text:'互动率',font:{size:10}},grid:{display:false}},
      }
    }
  });
}

// ─── Model horizontal bar ────────────────────────────────────────────────────
function renderModel(rows){
  destroyChart('modelChart');
  const g=groupBy(rows.filter(r=>r.model),r=>r.model);
  const models=Object.keys(g).sort((a,b)=>kpi(g[b]).cpm-kpi(g[a]).cpm);
  const cpms=models.map(m=>kpi(g[m]).cpm);
  const cpes=models.map(m=>kpi(g[m]).cpe);
  const ctx=document.getElementById('modelChart').getContext('2d');
  charts['modelChart']=new Chart(ctx,{
    type:'bar',
    data:{labels:models,datasets:[
      {label:'CPM (¥)',data:cpms,backgroundColor:'rgba(0,161,214,.8)',borderRadius:4},
      {label:'CPE (¥)',data:cpes,backgroundColor:'rgba(255,119,170,.8)',borderRadius:4},
    ]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11}}},tooltip:{callbacks:{
        label:ctx=>'¥'+fmt(ctx.raw,2)
      }}},
      scales:{
        x:{ticks:{callback:v=>'¥'+fmt(v,0),font:{size:10}},grid:{color:'#f0f4f8'}},
        y:{ticks:{font:{size:12}}},
      }
    }
  });
}

// ─── Target type chart ───────────────────────────────────────────────────────
function renderType(rows){
  destroyChart('typeChart');
  const g=groupBy(rows.filter(r=>r.targetType),r=>r.targetType);
  const types=Object.keys(g);
  if(types.length===0){
    document.getElementById('typeChart').parentElement.innerHTML='<div style="color:#9ca3af;text-align:center;padding:40px">无投放类型数据</div>';
    return;
  }
  const labels=['CPM (¥)','互动率 (%)','CPE (¥)'];
  const colors=['rgba(0,161,214,.8)','rgba(255,119,170,.8)','rgba(255,179,71,.8)'];
  const datasets=labels.map((lbl,li)=>({
    label:lbl,
    data:types.map(t=>{
      const k=kpi(g[t]);
      return li===0?k.cpm:li===1?k.ir*100:k.cpe;
    }),
    backgroundColor:colors[li],borderRadius:4
  }));
  const ctx=document.getElementById('typeChart').getContext('2d');
  charts['typeChart']=new Chart(ctx,{
    type:'bar',
    data:{labels:types,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11}}},tooltip:{callbacks:{
        label:ctx=>{
          const lbl=ctx.dataset.label;
          return lbl+'：'+(lbl.includes('%')?fmt(ctx.raw,2)+'%':'¥'+fmt(ctx.raw,2));
        }
      }}},
      scales:{x:{ticks:{font:{size:12}}},y:{ticks:{font:{size:10}},grid:{color:'#f0f4f8'}}}
    }
  });
}

// ─── Videos table with pagination ────────────────────────────────────────────
function renderTable(rows){
  tableRows = rows.slice().sort((a,b)=>b.views-a.views);
  currentPage = 1;
  renderTablePage();
}

function renderTablePage(){
  const avgCost  = tableRows.length?tableRows.reduce((s,r)=>s+r.cost,0)/tableRows.length:0;
  const avgViews = tableRows.length?tableRows.reduce((s,r)=>s+r.views,0)/tableRows.length:0;
  const total = tableRows.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1)*PAGE_SIZE;
  const page = tableRows.slice(start, start+PAGE_SIZE);

  const tbl = document.getElementById('topTable');
  tbl.innerHTML = `
    <thead><tr>
      <th>#</th><th>UP主</th><th>车型</th><th>分类</th><th>投放类型</th><th>消耗季度</th>
      <th>消耗(¥)</th><th>播放量</th><th>互动量</th><th>互动率</th><th>CPM(¥)</th><th>CPE(¥)</th>
    </tr></thead>
    <tbody>${page.map((r,i)=>{
      const rank = start+i+1;
      const ir=r.views>0?r.interactions/r.views:0;
      const cpm=r.views>0?r.cost/r.views*1000:0;
      const cpe=r.interactions>0?r.cost/r.interactions:0;
      const golden=r.cost>avgCost&&r.views>avgViews;
      return `<tr style="${golden?'background:rgba(255,179,71,.08)':''}">
        <td>${rank}${golden?' ⭐':''}</td>
        <td>${r.upName||'-'}</td>
        <td>${r.model||'-'}</td>
        <td><span class="tag ${r.upCat}">${r.upCat}</span></td>
        <td>${r.targetType||'-'}</td>
        <td>${r.quarter||'-'}</td>
        <td>${fmt(r.cost,0)}</td>
        <td>${wan(r.views)}</td>
        <td>${wan(r.interactions)}</td>
        <td>${pct(ir)}</td>
        <td>${fmt(cpm,1)}</td>
        <td>${cpe>0?fmt(cpe,1):'-'}</td>
      </tr>`;
    }).join('')}</tbody>`;

  // Pagination controls
  const pg = document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let html = `<span class="pg-info">共 ${total} 条，第 ${currentPage}/${totalPages} 页</span>`;
  html += `<button class="pg-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>«</button>`;
  html += `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  // show up to 5 page number buttons
  const range=2;
  for(let p=Math.max(1,currentPage-range);p<=Math.min(totalPages,currentPage+range);p++){
    html += `<button class="pg-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  html += `<button class="pg-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>`;
  pg.innerHTML = html;
}

function goPage(p){
  const totalPages = Math.ceil(tableRows.length/PAGE_SIZE);
  currentPage = Math.max(1,Math.min(p,totalPages));
  renderTablePage();
  document.getElementById('topTable').closest('.section').scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── Insights ────────────────────────────────────────────────────────────────
function renderInsights(rows){
  const k=kpi(rows);
  const byCat=groupBy(rows,r=>r.upCat);
  const byModel=groupBy(rows.filter(r=>r.model),r=>r.model);
  const byType=groupBy(rows.filter(r=>r.targetType),r=>r.targetType);

  // best cat by CPM
  const catStats=Object.entries(byCat).map(([c,list])=>({cat:c,...kpi(list),n:list.length}));
  catStats.sort((a,b)=>a.cpm-b.cpm);
  const bestCat=catStats[0];

  // best model by CPE
  const modelStats=Object.entries(byModel).map(([m,list])=>({model:m,...kpi(list),n:list.length}));
  modelStats.sort((a,b)=>a.cpe-b.cpe);
  const bestModel=modelStats[0];

  // type comparison
  const typeStats=Object.entries(byType).map(([t,list])=>({type:t,...kpi(list),n:list.length}));

  // golden videos
  const avgCost=rows.length?rows.reduce((s,r)=>s+r.cost,0)/rows.length:0;
  const avgViews=rows.length?rows.reduce((s,r)=>s+r.views,0)/rows.length:0;
  const golden=rows.filter(r=>r.cost>avgCost&&r.views>avgViews).sort((a,b)=>b.views-a.views).slice(0,3);

  // best day of week
  const byDow=groupBy(rows.filter(r=>r.date),r=>new Date(r.date).getDay());
  const dows=['周日','周一','周二','周三','周四','周五','周六'];
  const dowStats=Object.entries(byDow).map(([d,list])=>({label:dows[+d],...kpi(list)}));
  dowStats.sort((a,b)=>a.cpe-b.cpe);
  const bestDow=dowStats[0];

  const insights=[
    {
      ico:'👑',
      title:`性价比最高的 UP 主层级：<span class="highlight">${bestCat?.cat||'-'}</span>`,
      text: bestCat
        ? `平均CPM <strong>¥${fmt(bestCat.cpm,2)}</strong>，互动率 <strong>${pct(bestCat.ir)}</strong>，共 <strong>${bestCat.n}</strong> 条投放记录。建议优先分配预算至该层级。`
        : '样本不足'
    },
    {
      ico:'🚗',
      title:`CPE最低的车型：<span class="highlight pink">${bestModel?.model||'-'}</span>`,
      text: bestModel
        ? `CPE = <strong>¥${fmt(bestModel.cpe,2)}</strong>，CPM = <strong>¥${fmt(bestModel.cpm,2)}</strong>，互动率 <strong>${pct(bestModel.ir)}</strong>（${bestModel.n}条），该车型内容引发互动成本最低，建议加大投放。`
        : '样本不足'
    },
    {
      ico:'🎯',
      title:'投放类型效果对比',
      text: typeStats.length>0
        ? typeStats.map(t=>`<strong>[${t.type}]</strong> CPM=¥${fmt(t.cpm,2)} 互动率=${pct(t.ir)} CPE=¥${fmt(t.cpe,2)}（${t.n}条）`).join('　|　')
        + (typeStats.length>1?`　→ 推荐：<span class="highlight">${typeStats.sort((a,b)=>a.cpe-b.cpe)[0].type}</span>`:'')
        : '未检测到投放类型字段'
    },
    {
      ico:'📅',
      title:`推荐加大投放的时段：<span class="highlight green">${bestDow?.label||'-'}</span>`,
      text: bestDow
        ? `该日 CPE=<strong>¥${fmt(bestDow.cpe,2)}</strong>，互动率=<strong>${pct(bestDow.ir)}</strong>，每千次播放成本=<strong>¥${fmt(bestDow.cpm,2)}</strong>，综合效率最优。`
        : '无日期数据或样本不足'
    },
    {
      ico:'⭐',
      title:'高曝光-高互动黄金视频（建议追加投放）',
      text: golden.length>0
        ? golden.map(r=>`<strong>${r.upName||r.model}</strong>（播放${wan(r.views)}，互动率${pct(r.views>0?r.interactions/r.views:0)}，消耗¥${fmt(r.cost,0)}）`).join('　')
        : '当前筛选下无黄金视频'
    }
  ];

  document.getElementById('insightList').innerHTML = insights.map(ins=>
    `<div class="insight">
      <div class="ico">${ins.ico}</div>
      <div class="txt"><strong>${ins.title}</strong><p>${ins.text}</p></div>
    </div>`
  ).join('');
}

// ─── File upload ─────────────────────────────────────────────────────────────
function cleanKey(k){ return (k||'').replace(/[\r\n]+/g,'').trim(); }
function toNum(v){ if(!v&&v!==0)return 0; const s=String(v).replace(/[,\s￥¥$]/g,''); const n=parseFloat(s); return isFinite(n)?n:0; }

const COL={
  date:        ['视频上线时间','发布时间','发布日期'],
  cost:        ['结算金额（含折扣及服务费、不含税）','结算金额','消耗金额','花费','加热预算（含税的账户金额）'],
  views:       ['播放量','播放数','播放'],
  interactions:['互动量','互动数','互动'],
  model:       ['车型','车型名称','车系'],
  fans:        ['UP主粉丝数','粉丝数'],
  upCat:       ['UP主分类','UP主级别'],
  upName:      ['UP主名称','UP主','博主'],
  targetType:  ['投放类型（定向/通投）','投放类型','定向类型'],
  quarter:     ['消耗季度','预算季度','季度'],
};

function pick(row,cands){ for(const k of Object.keys(row)){if(cands.includes(cleanKey(k)))return row[k];} return undefined; }

function normRow(row,i){
  let date=pick(row,COL.date);
  if(date instanceof Date) date=date.toISOString().slice(0,10);
  else if(date) date=String(date).slice(0,10);
  return {
    id:i, date:date||null,
    upName:(pick(row,COL.upName)||'').toString().trim(),
    model:(pick(row,COL.model)||'').toString().trim()||null,
    upCat:(pick(row,COL.upCat)||'').toString().trim()||'未知',
    targetType:(pick(row,COL.targetType)||'').toString().trim()||null,
    quarter:(pick(row,COL.quarter)||'').toString().trim()||null,
    cost:Math.max(0,toNum(pick(row,COL.cost))),
    views:Math.max(0,toNum(pick(row,COL.views))),
    interactions:Math.max(0,toNum(pick(row,COL.interactions))),
  };
}

document.getElementById('fileInput').addEventListener('change',async function(e){
  const file=e.target.files[0]; if(!file)return;
  const name=file.name.toLowerCase();
  const el=document.getElementById('fname'); if(el) el.textContent=file.name;
  try{
    let rows=[];
    if(name.endsWith('.csv')){
      await new Promise(res=>{
        Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>{
          rows=r.data.map((row,i)=>{ const rr={}; Object.keys(row).forEach(k=>rr[cleanKey(k)]=row[k]); return normRow(rr,i); });
          res();
        }});
      });
    } else {
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{raw:false,defval:''});
      rows=json.map((row,i)=>{ const rr={}; Object.keys(row).forEach(k=>rr[cleanKey(k)]=row[k]); return normRow(rr,i); });
    }
    rows=rows.filter(r=>r.cost>0||r.views>0);
    if(!rows.length){alert('未能解析到有效数据，请检查列名格式');return;}
    allRows=rows; selMod=[]; selCat=[]; selType=[]; selQt=[];
    render();
  } catch(err){ alert('解析失败：'+err.message); }
});

// ─── Init ────────────────────────────────────────────────────────────────────
render();
